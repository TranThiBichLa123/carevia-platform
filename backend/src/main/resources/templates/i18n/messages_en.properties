# ---------- Activation Email (Đăng ký tài khoản) ----------
email.activation.title=[Carevia] Kích hoạt tài khoản thành viên
email.activation.greeting=Chào {0},
email.activation.text1=Cảm ơn bạn đã đăng ký tham gia cộng đồng Carevia. Vui lòng nhấn vào nút bên dưới để kích hoạt tài khoản của bạn:
