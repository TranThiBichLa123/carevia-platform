# ---------- Account Activation Success Email ----------
email.activation_success.title=[Carevia] Chào mừng bạn đến với Carevia!
email.activation_success.greeting=Chào mừng {0},
email.activation_success.text1=Tài khoản của bạn đã được kích hoạt thành công! Giờ đây bạn có thể mua sắm thiết bị và đặt lịch trải nghiệm da chuyên sâu.
email.activation_success.text2=Truy cập hệ thống Carevia tại đây:
email.activation_success.button=Đăng nhập ngay
email.activation_success.text3=Nếu bạn cần hỗ trợ về da hoặc cách sử dụng thiết bị, đừng ngần ngại liên hệ với chúng tôi.
email.activation_success.signature=Thân ái,\nCarevia Team

# ---------- Password Reset Email ----------
email.reset.title=[Carevia] Yêu cầu khôi phục mật khẩu
email.reset.greeting=Chào {0},
email.reset.text1=Chúng tôi nhận được yêu cầu đặt lại mật khẩu cho tài khoản Carevia của bạn. Vui lòng nhấn vào nút bên dưới để tạo mật khẩu mới:
email.reset.text2=Nếu bạn không yêu cầu điều này, tài khoản của bạn vẫn an toàn và bạn không cần làm gì thêm.
email.reset.signature=Trân trọng,\nĐội ngũ bảo mật Carevia
email.reset.button=Đặt lại mật khẩu

