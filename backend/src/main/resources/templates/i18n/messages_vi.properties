# ---------- Email kích hoạt tài khoản ----------
email.activation.title=[Carevia] Kích hoạt tài khoản thành viên
email.activation.greeting=Chào {0},
email.activation.text1=Chào mừng bạn đến với Carevia! Tài khoản của bạn đã được khởi tạo. Vui lòng nhấn vào liên kết bên dưới để kích hoạt tài khoản và khám phá các thiết bị chăm sóc da tốt nhất:
email.activation.text2=Nếu bạn không thực hiện yêu cầu này, vui lòng bảo mật thông tin và bỏ qua email.
email.activation.signature=Trân trọng,\nĐội ngũ Carevia
email.activation.button=Kích hoạt ngay

# ---------- Email kích hoạt thành công ----------
email.activation_success.title=[Carevia] Tài khoản của bạn đã sẵn sàng
email.activation_success.greeting=Chào mừng {0},
email.activation_success.text1=Tài khoản Carevia của bạn đã được kích hoạt thành công! Giờ đây bạn có thể đặt lịch trải nghiệm da chuyên sâu hoặc mua sắm các thiết bị chăm sóc da cao cấp.
email.activation_success.text2=Sử dụng liên kết dưới đây để truy cập hệ thống:
email.activation_success.button=Đăng nhập ngay
email.activation_success.text3=Nếu cần tư vấn về loại da hoặc cách sử dụng thiết bị, hãy liên hệ với chúng tôi ngay nhé.
email.activation_success.signature=Thân ái,\nCarevia Team

# ---------- Email đặt lại mật khẩu ----------
email.reset.title=[Carevia] Yêu cầu đặt lại mật khẩu
email.reset.greeting=Chào {0},
email.reset.text1=Chúng tôi đã nhận được yêu cầu khôi phục mật khẩu cho tài khoản Carevia của bạn. Vui lòng nhấn vào nút bên dưới để tạo mật khẩu mới:
email.reset.text2=Nếu bạn không yêu cầu điều này, tài khoản của bạn vẫn an toàn.
email.reset.signature=Trân trọng,\nĐội ngũ bảo mật Carevia
email.reset.button=Đặt lại mật khẩu

# ---------- Phần chân email ----------
email.footer.notice=Đây là email tự động, vui lòng không trả lời thư này.
email.footer.support=Cần hỗ trợ? Liên hệ chúng tôi tại support@carevia.com

# ---------- Duyệt tài khoản nhân viên (Staff) ----------
email.account_approved.title=[Carevia] Hồ sơ nhân viên đã được phê duyệt
email.account_approved.greeting=Xin chào {0},
email.account_approved.text1=Chào mừng bạn gia nhập đội ngũ Carevia! Hồ sơ của bạn đã được phê duyệt thành công.
email.account_approved.text2=Bạn có thể đăng nhập vào trang quản trị để quản lý thiết bị và lịch hẹn:
email.account_approved.button=Truy cập trang quản trị
email.account_approved.signature=Ban quản lý Carevia

email.account_rejected.title=[Carevia] Thông báo từ chối hồ sơ
email.account_rejected.greeting=Kính gửi {0},
email.account_rejected.text1=Yêu cầu đăng ký tài khoản nhân viên của bạn đã bị từ chối.
email.account_rejected.reason=Lý do: {0}
email.account_rejected.button=Cập nhật lại thông tin
email.account_rejected.signature=Phòng nhân sự Carevia

# ---------- Khóa/Mở khóa tài khoản ----------
email.account_suspended.title=[Carevia] Tài khoản bị tạm khóa
email.account_suspended.greeting=Kính gửi {0},
email.account_suspended.text1=Tài khoản của bạn đã bị tạm khóa do vi phạm chính sách của Carevia.
email.account_suspended.reason=Lý do: {0}
email.account_suspended.signature=Vui lòng liên hệ bộ phận hỗ trợ để được giải đáp.

email.account_unlocked.title=[Carevia] Tài khoản đã được mở khóa
email.account_unlocked.greeting=Chào mừng quay trở lại, {0}!
email.account_unlocked.text1=Tài khoản của bạn đã được mở khóa thành công. Bạn có thể tiếp tục sử dụng dịch vụ của Carevia ngay bây giờ.
email.account_unlocked.button=Đăng nhập ngay

